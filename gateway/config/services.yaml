# Athleia.ai — Gateway Service Registry
# Static configuration for Phase 1 service discovery.
# To add a new service: add a new top-level key under `services`.
# No code changes required.

gateway:
  port: 8000
  environment: development
  max_request_body_bytes: 10485760   # 10 MB

rate_limiting:
  enabled: true
  default_requests_per_window: 100
  window_seconds: 60

services:

  retrieval:
    path_prefix: /api/v1/retrieve
    instances:
      - url: http://localhost:8001
    load_balancer: round_robin
    policy:
      timeout_seconds: 30
      retries: 2                   # Retrieval is idempotent — safe to retry
      circuit_breaker:
        failure_threshold: 5
        cooldown_seconds: 30
    health_check:
      path: /api/v1/health
      interval_seconds: 30

  reasoning:
    path_prefix: /api/v1/reason
    instances:
      - url: http://localhost:8002
    load_balancer: round_robin
    policy:
      timeout_seconds: 120         # LLM calls may be slow
      retries: 0                   # Non-idempotent — never retry automatically
      circuit_breaker:
        failure_threshold: 3
        cooldown_seconds: 60
    health_check:
      path: /api/v1/health
      interval_seconds: 30

  # ── Stub entries for future services ─────────────────────────────────────
  # Uncomment and fill instance URLs when each service is deployed.

